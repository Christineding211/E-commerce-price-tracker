version: '3.0'  # 使用 Docker Compose 的版本 3.0，適合大部分部署場景

services:
  crawler_pchome:  # 定義一個服務，名稱為 crawler_pchome
    image: my-crawler:${DOCKER_IMAGE_VERSION}  # 使用的映像檔名稱與標籤（版本）
    hostname: "docker-pchome-{{.Task.Slot}}"
    command: uv run --env-file=.env airflow celery worker -q pchome_q -c 4 -H celery@%h -l info 
    # 啟動容器後執行的命令，這裡是啟動 Celery worker，指定 app 為 crawler.worker，設定日誌等級為 info，
    # 使用主機名稱當作 worker 名稱（%h），並將此 worker 加入名為 "twse" 的任務佇列 (queue)
    # swarm 設定
    deploy:
      mode: replicated
      replicas: 3
      placement:
        # 設定在
        # 只允許在擁有 "crawler_pchome=true" 識別證的機器上執行
        constraints: [node.labels.crawler_pchome==true]
    restart: always  # 若容器停止或崩潰，自動重新啟動
    environment:
      - TZ=Asia/Taipei  # 設定時區為台北（UTC+8）
      - PYTHONPATH=/dataflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+pymysql://root:ppWgnb_mfGe2m_@mysql/airflow
      - AIRFLOW__CELERY__CELERY_APP_NAME=crawler.worker.app
      - AIRFLOW__CELERY__CELERY_APP_NAME=crawler.worker.app
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://redis:6379/0
    networks:
      - my_swarm_network  # 將此服務連接到 my_swarm_network 網路

  crawler_momo:  # 定義一個服務，名稱為 crawler_momo
    image: my-crawler:${DOCKER_IMAGE_VERSION} # 使用的映像檔名稱與標籤（版本）
    hostname: "docker-momo-{{.Task.Slot}}"
    command: uv run --env-file=.env airflow celery worker -q momo_q -c 1 -H celery@%h -l info
    # 啟動容器後執行的命令，這裡是啟動 Celery worker，指定 app 為 crawler.worker，設定日誌等級為 info，
    # 使用主機名稱當作 worker 名稱（%h），並將此 worker 加入名為 "tpex" 的任務佇列 (queue)
    # swarm 設定
    deploy:
      mode: replicated
      replicas: 1
      placement:
        # 設定在
        # node label crawler_momo==true 的機器上執行
        constraints: [node.labels.crawler_momo==true]
    restart: always  # 若容器停止或崩潰，自動重新啟動
    environment:
      - TZ=Asia/Taipei  # 設定時區為台北（UTC+8）
      - PYTHONPATH=/dataflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+pymysql://root:ppWgnb_mfGe2m_@mysql/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=redis://redis:6379/0
    networks:
      - my_swarm_network  # 將此服務連接到 my_network 網路

networks:
  my_swarm_network:
    # 加入已經存在的網路
    external: true
