version: '3.0'  

services:
  producer_multi_queue:  
    image: my-crawler:${DOCKER_IMAGE_VERSION} # 使用的映像檔名稱與標籤（版本）
    hostname: "producer_multi_queue"  # 設定 hostname 
    command: uv run --env-file=.env python -m crawler.producer_multi_queue
    # swarm 設定
    deploy:
      mode: replicated
      replicas: 1
      placement:
        # 設定在
        # node label producer = true 的機器上執行
        constraints: [node.labels.producer_ecommerce==true]
    restart: on-failure  
    environment:
      - TZ=Asia/Taipei  
    networks:
      - my_swarm_network  

networks:
  my_swarm_network:
    # 加入已經存在的網路
    external: true
