version: '3.3'
services:

  mysql:
      image: mysql:8.0
      container_name: my_headphone_mysql  # 強制命名，避免被蓋掉
      # 設定 mysql 使用原生認證的密碼 hash
      command: mysqld --default-authentication-plugin=mysql_native_password
      ports: 
        # docker publish port 3306 to 3306 
        # (將 docker 內部 ip 3306, 跟外部 3306 做連結)
          - 3306:3306
        # - target: 3306
        #   published: 3306
        #   mode: host
      environment: # 環境變數, 設置 db, user, password, root_password
          MYSQL_DATABASE: headphone_db #my own db
          MYSQL_USER: user
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      restart: always  # 若容器停止或崩潰，自動重新啟動
      volumes:
          - my_own_mysql_data:/var/lib/mysql
          # share volumes of docker container to outside volume, 
          # let data persist
          # 將 docker container 的 volumes 跟外部 volumes 做連結, 
          # 讓資料不會因為, container close or update, 而遺失
      networks:
          - dev_network 

  phpmyadmin:
      # 升級到 5.2, 支援 amd64 / arm64 (Mac M1/M2 適用)
      image: phpmyadmin:5.2
      restart: always  # 若容器停止或崩潰，自動重新啟動
      ports:
          - 8000:80
      environment:
          # 使用 network 服務名稱連線到 mysql (取代過時的 links 寫法)
          PMA_HOST: mysql
          PMA_PORT: 3306
          
      depends_on:
        - mysql
      networks:
          - dev_network 
     
networks:
  dev_network :
    # 加入已經存在的網路
    external: true

volumes:
  my_own_mysql_data: # 這裡也要同步改名